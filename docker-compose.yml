version: "3.9"

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: metabase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: irene@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16
    container_name: metabase-postgres
    environment:
      POSTGRES_USER: scraper_admin
      POSTGRES_PASSWORD: scraper_pass_2024
      POSTGRES_DB: scraping_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper_admin -d scraping_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: metabase-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:
